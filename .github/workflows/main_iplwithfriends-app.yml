# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - iplwithfriends-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Validate frontend env vars
        env:
          REACT_APP_CLERK_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_CLERK_PUBLISHABLE_KEY }}
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ vars.REACT_APP_SOCKET_URL }}
        run: |
          test -n "$REACT_APP_CLERK_PUBLISHABLE_KEY" || (echo "Missing secret: REACT_APP_CLERK_PUBLISHABLE_KEY" && exit 1)
          test -n "$REACT_APP_API_URL" || (echo "Missing repo variable: REACT_APP_API_URL" && exit 1)
          test -n "$REACT_APP_SOCKET_URL" || (echo "Missing repo variable: REACT_APP_SOCKET_URL" && exit 1)

      - name: Create client env file
        env:
          REACT_APP_CLERK_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_CLERK_PUBLISHABLE_KEY }}
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ vars.REACT_APP_SOCKET_URL }}
        run: |
          {
            echo "REACT_APP_CLERK_PUBLISHABLE_KEY=$REACT_APP_CLERK_PUBLISHABLE_KEY"
            echo "REACT_APP_API_URL=$REACT_APP_API_URL"
            echo "REACT_APP_SOCKET_URL=$REACT_APP_SOCKET_URL"
          } > client/.env

      - name: npm install, build, and test
        env:
          REACT_APP_CLERK_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_CLERK_PUBLISHABLE_KEY }}
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ vars.REACT_APP_SOCKET_URL }}
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A9B85B75D7324EBFA1217A459FAD1990 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9A3200A4B48143848ADCFFB3163E682D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_55EDA6CA1A6140A09AE8B9824995946F }}

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "iplwithfriends-app"
          slot-name: "Production"
          package: .
